<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="header.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="main-header">
        <nav class="nav-buttons">
            <a href="login.html">Logout</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="pushtotalk.html">Push-to-Talk</a>
        
        </nav>
        <img src="logo.png" alt="Walki-Talki" class="logo-img" />
    </header>

  <main>
    <h2>Dashboard</h2>
    <p>Willkommen zurück, <strong>Benutzername</strong>!</p>

    <section class="overview">
        
        <h3>Übersicht</h3>
        <p>Hier findest du eine Zusammenfassung deiner Aktivitäten und Statistiken.</p>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Gesendete Nachrichten</span>
                <span class="stat-value">120</span>
            </div>

            <div class="stat-card">
                <span class="stat-label">Empfangene Nachrichten</span>
                <span class="stat-value">150</span>
            </div>

            <div class="stat-card">
                <span class="stat-label">Aktive Chats</span>
                <span class="stat-value">5</span>
            </div>
        </div>
      
    </section> 
  </main>


</body>
</html>
