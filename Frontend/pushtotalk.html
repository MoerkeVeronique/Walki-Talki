<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>Push-to-Talk</title>
    <link rel="stylesheet" href="header.css" />
    <link rel="stylesheet" href="style.css" />
   
</head>
<body>
    <header class="main-header">
        <nav class="nav-buttons">
            <a href="login.html">Logout</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="pushtotalk.html">Push-to-Talk</a>
        </nav>
        <img src="logo.png" alt="Walki-Talki" class="logo-img" />
    </header>

    <main>
        <section class="ptt-box">
            <h3>Push to Talk</h3>
            <p>Halte den Button gedrückt, um zu sprechen.</p>

            <button class="talkButton" class="talkButton aktiv" type="button" aria-label="Gedrückt halten zum Sprechen">
                <p>&#128483 
                    <br> HALTEN</p>
                
            </button>

            <p id="statusText" class="statusText">Bereit</p>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const talkButton = document.getElementById("talkButton");
        const statusText = document.getElementById("statusText");

        function startTalk() {
            talkButton.classList.add("aktiv");
            statusText.textContent = "Sprechen läuft...";
        }

        function stopTalk() {
            talkButton.classList.remove("aktiv");
            statusText.textContent = "Bereit";
        }

        talkButton.addEventListener("pointerdown", startTalk);
        talkButton.addEventListener("pointerup", stopTalk);
        talkButton.addEventListener("pointerleave", stopTalk);
        talkButton.addEventListener("pointercancel", stopTalk);
    </script>
</body>
</html>
