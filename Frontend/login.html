<!DOCTYPE html>
 
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
    <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
 
.container {
  text-align: center;
}
 
h1 {
  margin-bottom: 30px;
  font: arial;
}
 
.login-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 20px;
}
 
.login-form input {
  padding: 10px;
  margin: 8px 0;
  width: 200px;
  border-radius: 16px;
  border: 1px solid #ccc;
}
 
.login-btn {
  margin-top: 10px;
  padding: 8px 20px;
  background-color: #9fa823;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}
 
.register-link {
  display: block;
  margin-top: 15px;
  font-size: 12px;
  color: #555;
  text-decoration: none;
}
 .image-section {
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-section">
      <img style = "width: 200px; height: 200px" src="logo.png" alt="Walkie-Talkie" />
    </div>
    <form method="POST" class="login-form">
     
      <input name="username" type="text" placeholder="Benutzername" required>
      <input name="password" type="password" placeholder="Passwort" required>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <br>
    <a style="display: block; font-size: 12px;"href="register.html">Oder registrieren</a>
   
  </div>
</body>
</html>
